kind = "web"
previewPath = "/"
title = "Nutterx Technologies VCF Registration"
version = "1.0.0"
id = "artifacts/vcf-registration"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20078

[services.development]
run = "pnpm --filter @workspace/vcf-registration run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vcf-registration", "run", "build" ]
serve = "static"
publicDir = "artifacts/vcf-registration/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20078"
BASE_PATH = "/"
